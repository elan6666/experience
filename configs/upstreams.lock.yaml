  execution_status: "PARTIAL_VERIFIED_LICENSE_OVERRIDE_PENDING_ADAPTER"
  execution_status_reason: >-
    Ridge and LightGBM passed schema-v2 baseline smokes; iTransformer passed checkout,
    CUDA-12.8 compatibility smoke and integrity gates; FACT passed the same gates with
    a license-attribution warning. Exact historical dependency stacks failed on Python
    3.12 and are retained as ENV_FAIL. TimePro, TimeXer and S4M carry a user-asserted
    author authorization (license_authorization) recorded 2026-07-20 as a documented
    deviation; they are unblocked for checkout/smoke pending adapter implementation, not
    a formal license grant. The current GitHub remote-HEAD refresh remains UPSTREAM_FAIL
    due to timeouts.
