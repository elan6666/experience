schema_version: 1
audited_at_utc: "2026-07-19T07:20:00Z"
audit_method:
  source_audit: >-
    Official paper/repository links, repository root licenses and remote HEAD refs were
    checked from the Mac on 2026-07-19. This is source provenance only, not server smoke.
  commit_reachability: >-
    Schema-v2 detached checkout integrity, environment resolution and GPU smoke were
    executed on the approved server. The current remote-HEAD refresh is retained as
    UPSTREAM_FAIL because GitHub queries timed out after iTransformer; no stale receipt
    is promoted to a current pass.
  license_rule: >-
    A public repository without an explicit repository-level license is NOASSERTION and
    BLOCKED_LICENSE for copying, modification, patching, or redistribution until the
    copyright holder grants permission. A license in a vendored subdirectory does not
    license the surrounding repository.
  official_source_rule: >-
    A repository is called official only when the paper/proceedings page or the authors'
    repository identifies it as the implementation. Third-party ports are excluded.

baselines:
  ridge:
    kind: "algorithm_baseline"
    implementation: "sklearn.linear_model.Ridge"
    package: "scikit-learn==1.9.0"
    package_url: "https://pypi.org/project/scikit-learn/1.9.0/"
    source_url: "https://github.com/scikit-learn/scikit-learn"
    documentation_url: "https://scikit-learn.org/1.9/modules/generated/sklearn.linear_model.Ridge.html"
    license_spdx: "BSD-3-Clause"
    provenance_status: "READY"
    execution_device: "cpu"
    native_semantics:
      input: "2-D tabular matrix (samples, features)"
      output: "continuous regression prediction"
      objective: "squared error plus L2 coefficient penalty"
      optimizer: "closed-form or iterative solver selected by solver='auto'"
      scheduler: "none"
      inference: "estimator.predict(X)"
    project_boundary: >-
      Project baseline, not a paper reproduction. All preprocessing is fit on the
      training fold only and frozen before validation/test inference.

  lightgbm:
    kind: "algorithm_baseline"
    implementation: "lightgbm.LGBMRegressor"
    package: "lightgbm==4.7.0"
    package_url: "https://pypi.org/project/lightgbm/4.7.0/"
    source_url: "https://github.com/microsoft/LightGBM"
    documentation_url: "https://lightgbm.readthedocs.io/en/latest/pythonapi/lightgbm.LGBMRegressor.html"
    license_spdx: "MIT"
    provenance_status: "READY"
    execution_device: "cpu"
    native_semantics:
      input: "2-D tabular matrix (samples, features)"
      output: "continuous regression prediction"
      objective: "regression (L2) unless a versioned project config states otherwise"
      optimizer: "gradient-boosted decision trees"
      scheduler: "none; boosting rounds are fixed by versioned project configuration"
      inference: >-
        configured n_estimators unless an explicit versioned validation callback enables
        early stopping, in which case the frozen best_iteration_ is used
    project_boundary: >-
      Project baseline, not a paper reproduction. Version 4.7.0 was the current PyPI
      release on the audit date and must be installed from a locked artifact on server.

