    provenance_status: "READY_FOR_SERVER_SMOKE"
    official_entrypoint: "run.py"
    official_example: "bash scripts/multivariate_forecasting/ETT/iTransformer_ETTh1.sh"
    original_environment:
      python: "not pinned by upstream"
      torch: "2.0.0"
      numpy: "1.23.5"
      pandas: "1.5.3"
      scikit_learn: "1.2.2"
    native_semantics:
      architecture: "encoder-only Transformer over inverted variate tokens"
      input: "x_enc shaped (batch, lookback, variates), optional timestamp tokens"
      output: "point forecast shaped (batch, horizon, variates)"
      loss: "MSELoss"
      optimizer: "Adam"
      scheduler: "upstream adjust_learning_rate; scripts select lradj"
      early_stopping: "validation MSE, upstream patience default 3"
      inference: "best validation checkpoint, deterministic point forecast"
    fidelity_notes:
      - "Official trainer computes and prints test loss every epoch."
      - "Formal A-share runs must hide test data from that loop in an external runner."
      - "Architecture, MSE, Adam, scheduler, and forward inference remain unchanged."

